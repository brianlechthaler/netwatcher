x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  netwatcher:
    driver: bridge

volumes:
  kafka-data:
  elasticsearch-data:
  capture-logs:
  capture-pcap:

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: netwatcher-kafka
    networks: [netwatcher]
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging: *default-logging

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: netwatcher-elasticsearch
    networks: [netwatcher]
    ports:
      - "127.0.0.1:9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
    logging: *default-logging

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: netwatcher-kibana
    networks: [netwatcher]
    ports:
      - "127.0.0.1:5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    logging: *default-logging

  kibana-setup:
    image: curlimages/curl:8.10.1
    networks: [netwatcher]
    volumes:
      - ../../kibana:/kibana:ro
    entrypoint: ["/bin/sh", "/kibana/import-dashboards.sh"]
    depends_on:
      kibana:
        condition: service_healthy
    restart: "no"
    logging: *default-logging

  gateway:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.rust
    image: netwatcher-rust:local
    container_name: netwatcher-gateway
    command: netwatcher-gateway
    networks: [netwatcher]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      GATEWAY_BIND_ADDR: 0.0.0.0:8080
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: netwatcher
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
      GATEWAY_REQUIRE_API_KEY: ${GATEWAY_REQUIRE_API_KEY:-false}
      GATEWAY_MAX_BODY_BYTES: ${GATEWAY_MAX_BODY_BYTES:-10485760}
      GATEWAY_RATE_LIMIT_PER_MINUTE: ${GATEWAY_RATE_LIMIT_PER_MINUTE:-600}
      RUST_LOG: info
    depends_on:
      kafka:
        condition: service_healthy
    logging: *default-logging

  enricher:
    image: netwatcher-rust:local
    container_name: netwatcher-enricher
    command: netwatcher-enricher
    networks: [netwatcher]
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: netwatcher
      KAFKA_GROUP_ID: netwatcher-enricher
      THREAT_REFRESH_SECS: 3600
      RUST_LOG: info
    depends_on:
      kafka:
        condition: service_healthy
      gateway:
        condition: service_started
    logging: *default-logging

  indexer:
    image: netwatcher-rust:local
    container_name: netwatcher-indexer
    command: netwatcher-indexer
    networks: [netwatcher]
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: netwatcher
      KAFKA_GROUP_ID: netwatcher-indexer
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX_PREFIX: netwatcher
      RUST_LOG: info
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    logging: *default-logging

  mcp:
    image: netwatcher-rust:local
    container_name: netwatcher-mcp
    command: netwatcher-mcp
    networks: [netwatcher]
    stdin_open: true
    tty: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX_PREFIX: netwatcher
      RUST_LOG: info
      MCP_RATE_LIMIT_PER_MINUTE: "120"
      MCP_MAX_REQUEST_BYTES: "65536"
      MCP_MAX_QUERY_LENGTH: "1024"
      MCP_MAX_RESPONSE_BYTES: "524288"
    depends_on:
      elasticsearch:
        condition: service_healthy
      indexer:
        condition: service_started
    logging: *default-logging

  capture-agent:
    build:
      context: ../..
      dockerfile: docker/capture/Dockerfile
    image: netwatcher-capture:local
    container_name: netwatcher-capture-agent
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      CAPTURE_INTERFACE: ${CAPTURE_INTERFACE:-auto}
      GATEWAY_URL: ${GATEWAY_URL:-http://127.0.0.1:8080}
      AGENT_ID: ${AGENT_ID:-capture-agent-local}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
    volumes:
      - capture-logs:/logs
      - capture-pcap:/pcap
    profiles: ["capture"]
    logging: *default-logging
