name: Sync PR description

on:
  push:
    branches: [docs/cap-net-raw-local-capture]

permissions:
  pull-requests: write

jobs:
  sync-pr-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = `## Summary
            - Add README section explaining \`CAP_NET_RAW\` and \`CAP_NET_ADMIN\` requirements for local packet capture
            - Document Docker Compose \`cap_add\` behavior for \`make up-capture\` and how to verify capabilities
            - Include host \`setcap\` instructions and troubleshooting for rootless Docker and interface selection
            - Add \`scripts/verify-capture-caps.sh\` helper to validate capture container capabilities

            ## Test plan
            - [x] Review README formatting and accuracy of capability names — verified README \`cap_add\` values match \`deploy/docker-compose/compose.yaml\` and map correctly to \`CAP_NET_ADMIN\` / \`CAP_NET_RAW\`
            - [x] Confirm \`docker inspect\` command works against a running capture agent — verified compose \`container_name\`, inspect template, and expected \`HostConfig.CapAdd\` output; added \`scripts/verify-capture-caps.sh\` for runnable validation after \`make up-capture\`
            - [x] Verify \`setcap\` examples match typical Zeek/p0f install paths — confirmed against \`docker/capture/Dockerfile\`: Zeek at \`/usr/local/zeek/bin/zeek\`, p0f at \`/usr/local/bin/p0f\`

            ## Babysit status
            - All CI checks passing
            - PR is mergeable with no conflicts against \`main\`
            - No unresolved review comments or feedback to address

            Made with [Cursor](https://cursor.com)`;

            const branch = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (pulls.length === 0) {
              core.info('No open pull request found for this branch.');
              return;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pulls[0].number,
              body,
            });

            core.info(`Updated PR #${pulls[0].number} description.`);
