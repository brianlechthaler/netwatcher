name: Integration

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker run --rm \
            -v "${{ github.workspace }}/deploy/kubernetes:/work" -w /work \
            alpine/k8s:1.30.2 kustomize build . > /tmp/manifests.yaml
          echo "Generated $(wc -l < /tmp/manifests.yaml) lines of manifests"
