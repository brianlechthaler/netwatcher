name: Integration

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker run --rm \
            -v "${{ github.workspace }}/deploy/kubernetes:/work" -w /work \
            alpine/k8s:1.30.2 kustomize build . > /tmp/manifests.yaml
          echo "Generated $(wc -l < /tmp/manifests.yaml) lines of manifests"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.rust
          push: false
          load: true
          tags: netwatcher-rust:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/capture/Dockerfile
          push: false
          load: true
          tags: netwatcher-capture:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
